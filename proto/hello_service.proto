syntax = "proto3";

package helloService;


service HelloService {
    rpc multiHello (stream Hello) returns (MultiHelloResponse);
    rpc batchHello (stream Hello) returns (stream HelloResponse);
}


message Hello {
    string name = 1;
    string text = 2;
}

message MultiHelloResponse { 
    string title = 1;
    repeated Hello greetings = 2;
}

message HelloResponse {
    string text = 1;
}




